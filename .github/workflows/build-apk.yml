# Kịch bản tự động build APK cho FormApp
# File này sẽ tự chạy khi bạn push code lên GitHub

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Cho phép bấm nút chạy thủ công

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Bước 1: Tải code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Java (cần cho Android build)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Bước 3: Cài đặt Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      # Bước 4: Tải các package cần thiết
      - name: Install dependencies
        run: flutter pub get

      # Bước 5: Build file APK
      - name: Build APK
        # We also pass the run number to the Flutter build name to update internally
        run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      # Bước 6: Upload APK để bạn tải về (Dự phòng)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FormApp-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # Bước 7: Tạo công khai Bản Cập Nhật mới để App có thể tự tải
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Nâng cấp phiên bản 1.0.${{ github.run_number }}
          body: Hệ thống đã phát hành bản cập nhật mới nhất. Khắc phục lỗi và thêm tính năng tự động nâng cấp.
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
